name: Image-Build-Push
run-name: Image-Build-Push
on:
  push: 
    branches: ["master"]
jobs:
  build-and-push:
    runs-on: ubuntu-latest

    env:
      IMAGE_NAME: fitness-action
      TAG: v1.1.0

    steps:
    - name: Clone to VM
      uses: actions/checkout@v4
    
    - name: Docker setup
      uses: docker/setup-buildx-action@v3
    
    - name: Build Image
      run: |
        docker build -t $IMAGE_NAME .
    
    - name: Install Trivy
      run: |
        sudo apt update
        sudo apt install trivy -y

    - name: Scan-Image
      run: |
        trivy image --severity HIGH,CRITICAL --exit-code=0 $IMAGE_NAME:$TAG

    - name: Login Hub
      run: |
        echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

    - name: Tag Image
      run: |
        docker tag $IMAGE_NAME:$TAG ${{ secrets.DOCKER_USERNAME }}/$IMAGE_NAME:$TAG
    
    - name: Push Image
      run: |
        docker push ${{ secrets.DOCKER_USERNAME }}/$IMAGE_NAME:$TAG
