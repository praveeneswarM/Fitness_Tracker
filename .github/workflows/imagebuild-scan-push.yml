name: Image-Build-Push
run-name: Image-Build-Push
on:
  push: 
    branches: ["master"]
jobs:
  build-and-push:
    runs-on: ubuntu-latest

    env:
      IMAGE_NAME: fitness-action
      TAG: v1.1.0
      SONAR_TOKEN: ${{ secrets.SQ_TOKEN }}

    steps:
    - name: Clone to VM
      uses: actions/checkout@v4
    
    - name: Sonarqube Scan
      uses: SonarSource/sonarcloud-github-action@v2

    - name: Docker setup
      # uses: docker/setup-buildx-action@v3
      run: |
        # Add Docker's official GPG key:
        sudo apt update
        sudo apt install ca-certificates curl
        sudo install -m 0755 -d /etc/apt/keyrings
        sudo curl -fsSL https://download.docker.com/linux/ubuntu/gpg -o /etc/apt/keyrings/docker.asc
        sudo chmod a+r /etc/apt/keyrings/docker.asc

        # Add the repository to Apt sources:
        sudo tee /etc/apt/sources.list.d/docker.sources <<EOF
        Types: deb
        URIs: https://download.docker.com/linux/ubuntu
        Suites: $(. /etc/os-release && echo "${UBUNTU_CODENAME:-$VERSION_CODENAME}")
        Components: stable
        Architectures: $(dpkg --print-architecture)
        Signed-By: /etc/apt/keyrings/docker.asc
        EOF

        sudo apt update
        sudo apt install docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin
    
    - name: Build Images
      run: |
        docker build -t $IMAGE_NAME:$TAG .
    
    - name: Install Trivy
      run: |
        sudo apt update
        sudo apt install trivy -y

    - name: Scan-Image
      run: |
        trivy image --severity HIGH,CRITICAL $IMAGE_NAME:$TAG

    - name: Login Hub
      run: |
        echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

    - name: Tag Image
      run: |
        docker tag $IMAGE_NAME:$TAG ${{ secrets.DOCKER_USERNAME }}/$IMAGE_NAME:$TAG
    
    - name: Push Image
      run: |
        docker push ${{ secrets.DOCKER_USERNAME }}/$IMAGE_NAME:$TAG
